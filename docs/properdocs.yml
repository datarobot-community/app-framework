site_name: DataRobot App Framework
site_url: https://datarobot-oss.github.io/app-framework/
site_description: Documentation and enablement for the DataRobot App Framework
repo_url: https://github.com/datarobot-oss/app-framework
repo_name: datarobot-oss/app-framework
edit_uri: edit/main/docs/src/

theme:
  name: material
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

extra_css:
  - stylesheets/extra.css

plugins:
  - search

# Output configuration
site_dir: site
docs_dir: src

# Navigation structure
nav:
  - Home: index.md
  - Design:
    - design/index.md
    - Principles: design/principles.md
    - Component Model: design/component-model.md
    - CLI: design/cli.md
    - Declarative API: design/declarative-api.md
  - Components:
    - components/index.md
    - Base: components/base.md
    - LLM: components/llm.md
    - FastAPI Backend: components/fastapi-backend.md
    - React Frontend: components/react.md
    - Agent: components/agent.md
    - DataRobot MCP: components/datarobot-mcp.md
  - Guides:
    - guides/zero-vibe.md
    - guides/custom-pages.md
    - guides/vector-database.md
  - Developer Guide: developer.md
  - Skills: skills.md

# Exclude patterns to avoid processing non-documentation files
exclude_docs: |
  site/
  .venv/
  pyproject.toml
